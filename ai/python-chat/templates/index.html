<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .markdown-body pre { background: #1a1b26; padding: 1.25rem; border-radius: 0.75rem; position: relative; margin: 1rem 0; border: 1px solid #414868; }
        .markdown-body code { font-family: 'Fira Code', monospace; font-size: 0.85rem; }
        .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.2rem 0.6rem; background: #414868; color: #a9b1d6; font-size: 0.7rem; border-radius: 0.4rem; cursor: pointer; opacity: 0.8; }
        .copy-btn:hover { background: #565f89; opacity: 1; }
        /* Smooth scrolling for chat */
        #chat-box { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#0d1117] text-slate-200 min-h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-slate-800 bg-[#161b22] flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="text-lg font-bold tracking-tight">Qwen <span class="text-blue-500">Assistant</span></h1>
        </div>
        <span class="text-xs text-slate-500 font-mono">Model: fb-qwen-7b-instruct-3</span>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 max-w-5xl mx-auto w-full">
        <div id="welcome" class="text-center py-24">
            <h2 class="text-4xl font-extrabold text-slate-100 mb-4">How can I help you today?</h2>
            <p class="text-slate-500 text-lg">Generate code, debug EKS clusters, or just brainstorm ideas.</p>
        </div>
    </main>

    <footer class="p-6 bg-[#161b22] border-t border-slate-800">
        <div class="max-w-5xl mx-auto">
            <div class="relative flex items-center">
                <input type="text" id="user-input" autocomplete="off"
                       class="w-full bg-[#0d1117] border border-slate-700 rounded-2xl px-6 py-4 pr-32 focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all text-slate-100"
                       placeholder="Message AI Assistant...">
                <button onclick="handleSend()" id="send-btn"
                        class="absolute right-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold transition-all">
                    Send
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-600 mt-3 uppercase tracking-widest">Powered by vLLM & Rafay GenAI</p>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            document.getElementById('welcome')?.remove();
            appendMessage('user', text);
            userInput.value = '';

            const aiMsgId = appendMessage('ai', '<div class="flex gap-2"><div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce [animation-delay:-.3s]"></div><div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce [animation-delay:-.5s]"></div></div>');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                
                const data = await response.json();
                
                if (data.answer) {
                    const html = marked.parse(data.answer);
                    updateMessage(aiMsgId, html);
                    addCopyButtons();
                } else {
                    updateMessage(aiMsgId, `<span class="text-red-400 font-bold">Error:</span> ${data.error}`);
                }
            } catch (err) {
                updateMessage(aiMsgId, `<span class="text-red-400">Critical: Could not connect to the Flask server.</span>`);
            }
        }

        function appendMessage(role, content) {
            const id = 'msg-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            wrapper.id = id;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] px-6 py-4 rounded-2xl shadow-lg markdown-body ${
                role === 'user' ? 'bg-blue-700 text-white font-medium' : 'bg-[#21262d] border border-slate-700'
            }`;
            bubble.innerHTML = content;
            
            wrapper.appendChild(bubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function updateMessage(id, html) {
            const msg = document.getElementById(id).querySelector('.markdown-body');
            msg.innerHTML = html;
            hljs.highlightAll();
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((block) => {
                if (!block.querySelector('.copy-btn')) {
                    const button = document.createElement('button');
                    button.innerText = 'Copy Code';
                    button.className = 'copy-btn';
                    button.onclick = () => {
                        const code = block.querySelector('code').innerText;
                        navigator.clipboard.writeText(code);
                        button.innerText = 'Copied!';
                        setTimeout(() => button.innerText = 'Copy Code', 2000);
                    };
                    block.appendChild(button);
                }
            });
        }
    </script>
</body>
</html>
